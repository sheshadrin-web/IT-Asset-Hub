name: Build Check — Miles Education Helpdesk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Render target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/asset-desk run build:render

      - name: Verify output
        run: |
          echo "Build output:"
          ls -lh artifacts/asset-desk/dist/public/
          echo "index.html size: $(wc -c < artifacts/asset-desk/dist/public/index.html) bytes"
