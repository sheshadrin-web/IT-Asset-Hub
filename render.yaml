services:
  - type: web
    name: miles-helpdesk
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/asset-desk run build:render
    staticPublishPath: artifacts/asset-desk/dist/public
    # PR previews are disabled to prevent production Supabase data being accessible
    # via untrusted preview URLs built with prod env vars.
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Prevent the app from being embedded in iframes on other origins (clickjacking)
      - path: /*
        name: X-Frame-Options
        value: DENY
      # Control how much referrer info is sent to third-party services
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Restrict access to sensitive browser APIs not needed by this app
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      # Content Security Policy — allows Supabase, Google Fonts, and self only
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none';"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
