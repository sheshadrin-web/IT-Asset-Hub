services:
  - type: web
    name: miles-helpdesk
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/asset-desk run build:render
    staticPublishPath: artifacts/asset-desk/dist/public
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
